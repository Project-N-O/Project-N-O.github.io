<html lang="es">
<head>

<link rel="apple-touch-icon" sizes="76x76" href="Images/apple-touch-icon-ipad-76x76.png">
<link rel="apple-touch-icon" sizes="152x152" href="Images/apple-touch-icon-ipad-retina-152x152.png">
<link rel="apple-touch-icon" sizes="120x120" href="Images/apple-touch-icon-iphone-retina-120x120.png">
<link rel="apple-touch-icon" sizes="167x167" href="Images/apple-touch-icon-iphone-retina-167x167.png">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project NOS</title>
  <style>
    :root {
      --color-background-primary: #FFFFFF;
      --color-background-secondary: #F5F4F0;
      --color-text-primary: #1A1A18;
      --color-text-secondary: #6B6A65;
      --color-border-tertiary: #E4E3DC;
      --color-border-secondary: #D0CFC8;
      --border-radius-lg: 12px;
      --border-radius-md: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1C1C1A;
        --color-background-secondary: #252522;
        --color-text-primary: #F0EFE8;
        --color-text-secondary: #9A9990;
        --color-border-tertiary: #2E2E2B;
        --color-border-secondary: #3A3A36;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
      transition: padding 0.3s ease;
    }
    body.maximized {
      padding: 0;
    }

    /* ── top bar ── */
    .topbar {
      position: fixed;
      top: 0; right: 0;
      padding: 10px 14px;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: var(--border-radius-md);
      border: 0.5px solid var(--color-border-secondary);
      background: var(--color-background-primary);
      color: var(--color-text-secondary);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: all 0.15s;
    }
    .btn-toggle:hover {
      color: var(--color-text-primary);
      border-color: var(--color-text-secondary);
    }
    .btn-toggle svg { flex-shrink: 0; }

    .page {
      max-width: 720px;
      margin: 0 auto;
      transition: max-width 0.3s ease, padding 0.3s ease;
    }
    body.maximized .page {
      max-width: 100%;
      padding: 1.5rem 2rem;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 1.5rem;
    }

    /* ── tabs ── */
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab {
      padding: 6px 16px;
      border-radius: var(--border-radius-md);
      border: 0.5px solid var(--color-border-secondary);
      background: transparent;
      font-size: 13px;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .tab.active-gray  { background: #D3D1C7; color: #2C2C2A; border-color: #D3D1C7; }
    .tab.active-teal  { background: #9FE1CB; color: #04342C; border-color: #9FE1CB; }
    .tab.active-blue  { background: #B5D4F4; color: #042C53; border-color: #B5D4F4; }
    .tab.active-amber { background: #FAC775; color: #412402; border-color: #FAC775; }

    /* ── card ── */
    .top-card {
      border-radius: var(--border-radius-lg);
      border: 0.5px solid var(--color-border-tertiary);
      padding: 1.25rem;
      margin-bottom: 14px;
      background: var(--color-background-primary);
    }
    .scenario-label {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: var(--border-radius-md);
      display: inline-block;
      margin-bottom: 10px;
      font-weight: 500;
    }

    /* ── app rows ── */
    .app-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 0.5px solid var(--color-border-tertiary);
    }
    .app-row:last-of-type { border-bottom: none; }
    .app-logo {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      flex-shrink: 0;
    }
    .app-name  { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 2px; }
    .app-desc  { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; margin: 0 0 4px; }
    .app-why   { font-size: 12px; line-height: 1.5; margin: 0; }
    .app-stats { display: flex; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
    .stat-pill {
      font-size: 11px; padding: 2px 8px;
      border-radius: var(--border-radius-md);
      background: var(--color-background-secondary);
      color: var(--color-text-secondary);
    }

    /* ── lesson box ── */
    .lesson-box {
      border-left: 2px solid;
      padding: 10px 14px;
      border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0;
      background: var(--color-background-secondary);
      margin-top: 14px;
    }
    .lesson-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; font-weight: 600; }
    .lesson-text  { font-size: 13px; color: var(--color-text-primary); line-height: 1.6; }

    /* ── metrics ── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px; margin: 14px 0;
    }
    .mcard { background: var(--color-background-primary); border-radius: var(--border-radius-md); padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); }
    .mcard-label { font-size: 10px; color: var(--color-text-secondary); margin-bottom: 3px; }
    .mcard-val   { font-size: 17px; font-weight: 500; color: var(--color-text-primary); }
    .mcard-sub   { font-size: 10px; color: var(--color-text-secondary); margin-top: 1px; }

    /* ── chart ── */
    .chart-wrap { position: relative; width: 100%; height: 200px; margin-top: 14px; }

    /* ── timeline ── */
    .timeline { margin-top: 20px; border-top: 0.5px solid var(--color-border-tertiary); padding-top: 14px; }
    .thead { display: flex; gap: 10px; padding: 0 0 5px; }
    .th { font-size: 10px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
    .trow { display: flex; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--color-border-tertiary); align-items: center; }
    .trow:last-child { border-bottom: none; }
    .trow.key { background: var(--color-background-secondary); border-radius: 6px; padding: 7px 6px; }
    .tyear { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); min-width: 40px; }
    .tusers{ font-size: 12px; font-weight: 500; color: var(--color-text-primary); min-width: 80px; }
    .tmrr  { font-size: 12px; color: var(--color-text-secondary); min-width: 80px; }
    .tarr  { font-size: 12px; color: var(--color-text-secondary); min-width: 80px; }
    .thito { font-size: 11px; color: var(--color-text-secondary); margin-left: auto; text-align: right; }

    /* ── login overlay ── */
    #login-overlay {
      position: fixed;
      inset: 0;
      background: var(--color-background-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #login-overlay.hidden { display: none; }
    .login-card {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .login-card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 0.35rem;
    }
    .login-card p {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 1.5rem;
    }
    .login-input {
      width: 100%;
      padding: 9px 12px;
      border-radius: var(--border-radius-md);
      border: 0.5px solid var(--color-border-secondary);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      text-align: center;
      letter-spacing: 0.1em;
    }
    .login-input:focus { border-color: var(--color-text-secondary); }
    .login-input.error { border-color: #E05252; }
    .login-btn {
      margin-top: 12px;
      width: 100%;
      padding: 9px;
      border-radius: var(--border-radius-md);
      border: none;
      background: var(--color-text-primary);
      color: var(--color-background-primary);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-error {
      font-size: 11px;
      color: #E05252;
      margin-top: 8px;
      min-height: 16px;
    }

    /* ── mobile (iPhone 13/16: 390px wide) ── */
    @media (max-width: 430px) {
      body { padding: 1rem 0.75rem; padding-top: 3.5rem; }

      h1 { font-size: 0.95rem; margin-bottom: 1rem; }

      /* tabs scroll horizontally instead of wrapping */
      .tabs {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        gap: 6px;
        margin-bottom: 14px;
        padding-bottom: 2px;
      }
      .tabs::-webkit-scrollbar { display: none; }
      .tab { white-space: nowrap; padding: 6px 12px; font-size: 12px; flex-shrink: 0; }

      /* card padding reduced */
      .top-card { padding: 1rem; }

      /* app rows tighter */
      .app-row { gap: 10px; padding: 10px 0; }
      .app-logo { width: 32px; height: 32px; font-size: 10px; }
      .app-name  { font-size: 13px; }
      .app-desc  { font-size: 11px; }
      .app-why   { font-size: 11px; }
      .stat-pill { font-size: 10px; padding: 2px 6px; }

      /* metrics 2 columns on mobile */
      .metrics { grid-template-columns: 1fr 1fr; gap: 6px; }
      .mcard { padding: 8px 10px; }
      .mcard-val { font-size: 15px; }

      /* timeline: hide ARR column, tighten */
      .tarr  { display: none; }
      .th:nth-child(4) { display: none; }
      .tyear { min-width: 34px; }
      .tusers { min-width: 60px; font-size: 11px; }
      .tmrr  { min-width: 64px; font-size: 11px; }
      .thito { font-size: 10px; }
      .trow, .trow.key { gap: 6px; }

      /* chart slightly shorter */
      .chart-wrap { height: 160px; }

      /* topbar button smaller */
      .btn-toggle { padding: 4px 10px; font-size: 11px; }
      .topbar { padding: 8px 10px; }
    }
  </style>
</head>
<body>


<div id="login-overlay">
  <div class="login-card">
    <h2>Acceso restringido</h2>
    <p>Introduce la contraseña para continuar</p>

  <div id="content"></div>
</div>

function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return Math.round(n/1000)+'k';
  return n.toString();
}
function fmtEur(n) {
  if (n >= 1000000) return '€'+(n/1000000).toFixed(1)+'M';
  if (n >= 1000) return '€'+Math.round(n/1000)+'k';
  return '€'+n;
}

function set(idx) {
  current = idx;
  const s = scenarios[idx];
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.className = 'tab' + (i === idx ? ' ' + s.tabClass : '');
  });
  render();
}

function render() {
  const s = scenarios[current];
  const u10 = s.users[10];
  const mrr10 = Math.round(u10 * 9.99);
  const arr10 = mrr10 * 12;
  const u5 = s.users[5];
  const mrr5 = Math.round(u5 * 9.99);
  const labels = ['Año 0','Año 1','Año 2','Año 3','Año 4','Año 5','Año 6','Año 7','Año 8','Año 9','Año 10'];

  const appsHtml = s.apps.map(a => `
    <div class="app-row">
      <div class="app-logo" style="background:${a.bg};color:${a.textColor}">${a.initials}</div>
      <div style="flex:1;min-width:0">
        <p class="app-name">${a.name}</p>
        <p class="app-desc">${a.desc}</p>
        <p class="app-why" style="color:${s.color}">${a.why}</p>
        <div class="app-stats">${a.stats.map(st => `<span class="stat-pill">${st}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');

  let timelineHtml = `
    <div class="thead">
      <span class="th" style="min-width:40px">Año</span>
      <span class="th" style="min-width:80px">Usuarios</span>
      <span class="th" style="min-width:80px">MRR</span>
      <span class="th" style="min-width:80px">ARR</span>
      <span class="th" style="margin-left:auto">Hito</span>
    </div>`;

  for (let i = 1; i <= 10; i++) {
    const u = s.users[i], mrr = Math.round(u * 9.99), arr = mrr * 12;
    const isKey = [2, 5, 10].includes(i);
    timelineHtml += `
      <div class="trow${isKey ? ' key' : ''}">
        <span class="tyear">Año ${i}</span>
        <span class="tusers">${fmt(u)}</span>
        <span class="tmrr">${fmtEur(mrr)}/mes</span>
        <span class="tarr">${fmtEur(arr)}/año</span>
        <span class="thito">${s.milestones[i]}</span>
      </div>`;
  }

  document.getElementById('content').innerHTML = `
    <div class="top-card">
      <span class="scenario-label" style="background:${s.tagBg};color:${s.tagColor}">${s.label}</span>
      ${appsHtml}
      <div class="lesson-box" style="border-left-color:${s.borderColor}">
        <div class="lesson-label" style="color:${s.borderColor}">Patrón común</div>
        <div class="lesson-text">${s.lesson}</div>
      </div>
    </div>

    <div class="metrics">
      <div class="mcard"><div class="mcard-label">Usuarios año 10</div><div class="mcard-val">${fmt(u10)}</div><div class="mcard-sub">pagando €9,99/mes</div></div>
      <div class="mcard"><div class="mcard-label">MRR año 10</div><div class="mcard-val">${fmtEur(mrr10)}</div><div class="mcard-sub">al mes</div></div>
      <div class="mcard"><div class="mcard-label">ARR año 10</div><div class="mcard-val">${fmtEur(arr10)}</div><div class="mcard-sub">al año</div></div>
      <div class="mcard"><div class="mcard-label">MRR año 5</div><div class="mcard-val">${fmtEur(mrr5)}</div><div class="mcard-sub">punto intermedio</div></div>
    </div>

    <div class="chart-wrap">
      <canvas id="mainChart" role="img" aria-label="Proyección usuarios 10 años · ${s.label}"></canvas>
    </div>
    <div class="timeline">${timelineHtml}</div>
  `;

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('mainChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Usuarios',
        data: s.users,
        borderColor: s.color,
        backgroundColor: s.colorLight,
        borderWidth: 2.5,
        pointRadius: 4,
        pointBackgroundColor: s.color,
        tension: 0.4,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${fmt(ctx.parsed.y)} usuarios · MRR ${fmtEur(Math.round(ctx.parsed.y * 9.99))}`
          }
        }
      },
      scales: {
        x: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 11 } } },
        y: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 11 }, callback: v => fmt(v) } }
      }
    }
  });
}

set(1);

// ── maximize / minimize ──
const ICON_EXPAND = `<polyline points="1,5 1,1 5,1"/><polyline points="8,1 12,1 12,5"/><polyline points="12,8 12,12 8,12"/><polyline points="5,12 1,12 1,8"/>`;
const ICON_SHRINK = `<polyline points="5,1 5,5 1,5"/><polyline points="12,5 8,5 8,1"/><polyline points="8,12 8,8 12,8"/><polyline points="1,8 5,8 5,12"/>`;

function toggleSize() {
  const maximized = document.body.classList.toggle('maximized');
  document.getElementById('toggleLabel').textContent = maximized ? 'Minimizar' : 'Maximizar';
  document.getElementById('toggleIcon').innerHTML = maximized ? ICON_SHRINK : ICON_EXPAND;
  document.getElementById('toggleBtn').title = maximized ? 'Minimizar' : 'Maximizar';
  if (chart) { chart.resize(); }
}


// ── login ──
const PAIN = 'success'; // cambia esto
function checkPwd() {
  const val = document.getElementById('pwd').value;
  const input = document.getElementById('pwd');
  if (val === PAIN) {
    document.getElementById('login-overlay').classList.add('hidden');
    sessionStorage.setItem('auth', '1');
  } else {
    input.classList.add('error');
    document.getElementById('login-error').textContent = 'Contraseña incorrecta';
    setTimeout(() => { input.classList.remove('error'); input.value = ''; input.focus(); }, 1200);
  }
}
// keep unlocked during same session
if (sessionStorage.getItem('auth') === '1') {
  document.getElementById('login-overlay').classList.add('hidden');
}

</script>
</body>
</html>
