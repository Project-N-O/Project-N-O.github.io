<!DOCTYPE html>
<html lang="es">
<head>
<link rel="apple-touch-icon" sizes="180x180" href="Images/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="76x76" href="Images/apple-touch-icon-ipad-76x73.png">
<link rel="apple-touch-icon" sizes="152x152" href="Images/apple-touch-icon-ipad-retina-152x153.png">
<link rel="apple-touch-icon" sizes="120x120" href="Images/apple-touch-icon-iphone-retina-120x123.png">
<link rel="apple-touch-icon" sizes="167x167" href="Images/apple-touch-icon-iphone-retina-167x163.png">
<link rel="icon" type="image/png" sizes="32x32" href="Images/ds.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project NOS</title>
<style>
  :root {
    --color-background-primary: #FFFFFF;
    --color-background-secondary: #F5F4F0;
    --color-text-primary: #1A1A18;
    --color-text-secondary: #6B6A65;
    --color-border-tertiary: #E4E3DC;
    --color-border-secondary: #D0CFC8;
    --border-radius-lg: 12px;
    --border-radius-md: 8px;
    --sidebar-width: 220px;
    --sidebar-collapsed: 56px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1C1C1A;
      --color-background-secondary: #252522;
      --color-text-primary: #F0EFE8;
      --color-text-secondary: #9A9990;
      --color-border-tertiary: #2E2E2B;
      --color-border-secondary: #3A3A36;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    min-height: 100vh;
    display: flex;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-width);
    min-height: 100vh;
    background: var(--color-background-primary);
    border-right: 0.5px solid var(--color-border-tertiary);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transition: width 0.25s ease;
    overflow: hidden;
  }
  .sidebar.collapsed { width: var(--sidebar-collapsed); }

  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 14px 12px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    min-height: 52px;
  }
  .sidebar-logo {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    object-fit: cover;
    flex-shrink: 0;
    opacity: 1;
    transition: opacity 0.2s, width 0.2s;
  }
  .sidebar.collapsed .sidebar-logo { opacity: 0; width: 0; overflow: hidden; pointer-events: none; }

  .btn-collapse {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--color-text-secondary);
    padding: 4px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: color 0.15s, background 0.15s;
  }
  .btn-collapse:hover { color: var(--color-text-primary); background: var(--color-background-secondary); }

  .sidebar-nav {
    flex: 1;
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    border: none;
    background: none;
    color: var(--color-text-secondary);
    font-size: 13px;
    font-family: inherit;
    text-align: left;
    white-space: nowrap;
    width: 100%;
    transition: background 0.15s, color 0.15s;
  }
  .nav-item:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
  .nav-item.active { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; }
  .nav-icon { flex-shrink: 0; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
  .nav-label { opacity: 1; transition: opacity 0.2s; white-space: nowrap; }
  .sidebar.collapsed .nav-label { opacity: 0; width: 0; overflow: hidden; }
  .sidebar.collapsed .nav-item { justify-content: center; padding: 9px 0; }
  .sidebar.collapsed .sidebar-header { justify-content: center; padding: 16px 0 12px; }

  /* ── MAIN CONTENT ── */
  .main {
    margin-left: var(--sidebar-width);
    flex: 1;
    min-height: 100vh;
    padding: 2rem 1.5rem;
    transition: margin-left 0.25s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .main > * { width: 100%; max-width: 760px; }
  .main.expanded { margin-left: var(--sidebar-collapsed); }

  /* sections */
  .section { display: none; }
  .section.active { display: block; }
  #section-cuentas.active { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 75vh; }

  h1 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--color-text-primary);
    margin-bottom: 1.5rem;
  }

  /* ── TABS ── */
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab {
    padding: 6px 16px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: transparent;
    font-size: 13px;
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .tab.active-gray  { background: #D3D1C7; color: #2C2C2A; border-color: #D3D1C7; }
  .tab.active-teal  { background: #9FE1CB; color: #04342C; border-color: #9FE1CB; }
  .tab.active-blue  { background: #B5D4F4; color: #042C53; border-color: #B5D4F4; }
  .tab.active-amber { background: #FAC775; color: #412402; border-color: #FAC775; }

  /* ── CARD ── */
  .top-card {
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--color-border-tertiary);
    padding: 1.25rem;
    margin-bottom: 14px;
    background: var(--color-background-primary);
  }
  .scenario-label {
    font-size: 11px; padding: 3px 10px;
    border-radius: var(--border-radius-md);
    display: inline-block; margin-bottom: 10px; font-weight: 500;
  }

  /* ── APP ROWS ── */
  .app-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 0; border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .app-row:last-of-type { border-bottom: none; }
  .app-logo {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
  }
  .app-name  { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 2px; }
  .app-desc  { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; margin: 0 0 4px; }
  .app-why   { font-size: 12px; line-height: 1.5; margin: 0; }
  .app-stats { display: flex; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
  .stat-pill {
    font-size: 11px; padding: 2px 8px;
    border-radius: var(--border-radius-md);
    background: var(--color-background-secondary);
    color: var(--color-text-secondary);
  }

  /* ── LESSON BOX ── */
  .lesson-box {
    border-left: 2px solid; padding: 10px 14px;
    border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0;
    background: var(--color-background-secondary); margin-top: 14px;
  }
  .lesson-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; font-weight: 600; }
  .lesson-text  { font-size: 13px; color: var(--color-text-primary); line-height: 1.6; }

  /* ── METRICS ── */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin: 14px 0; }
  .mcard { background: var(--color-background-primary); border-radius: var(--border-radius-md); padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); }
  .mcard-label { font-size: 10px; color: var(--color-text-secondary); margin-bottom: 3px; }
  .mcard-val   { font-size: 17px; font-weight: 500; color: var(--color-text-primary); }
  .mcard-sub   { font-size: 10px; color: var(--color-text-secondary); margin-top: 1px; }

  /* ── CHART ── */
  .chart-wrap { position: relative; width: 100%; height: 200px; margin-top: 14px; }

  /* ── TIMELINE ── */
  .timeline { margin-top: 20px; border-top: 0.5px solid var(--color-border-tertiary); padding-top: 14px; }
  .thead { display: flex; gap: 10px; padding: 0 0 5px; }
  .th { font-size: 10px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
  .trow { display: flex; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--color-border-tertiary); align-items: center; }
  .trow:last-child { border-bottom: none; }
  .trow.key { background: var(--color-background-secondary); border-radius: 6px; padding: 7px 6px; }
  .tyear  { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); min-width: 40px; }
  .tusers { font-size: 12px; font-weight: 500; color: var(--color-text-primary); min-width: 80px; }
  .tmrr   { font-size: 12px; color: var(--color-text-secondary); min-width: 80px; }
  .tarr   { font-size: 12px; color: var(--color-text-secondary); min-width: 80px; }
  .thito  { font-size: 11px; color: var(--color-text-secondary); margin-left: auto; text-align: right; }

  /* ── COUNTDOWN SECTION ── */
  #section-cuentas {
    display: none;
    min-height: 80vh;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #section-cuentas.active {
    display: flex;
  }
  .countdown-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 8px;
  }
  .cd-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1.5rem 1.25rem;
    text-align: center;
  }
  .cd-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--color-text-secondary);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .cd-date {
    font-size: 12px;
    color: var(--color-text-secondary);
    margin-bottom: 1.25rem;
  }
  .cd-units {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .cd-unit { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .cd-num {
    font-size: 28px;
    font-weight: 600;
    color: var(--color-text-primary);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .cd-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--color-text-secondary);
  }
  .cd-sep {
    font-size: 22px;
    color: var(--color-border-secondary);
    font-weight: 300;
    align-self: flex-start;
    padding-top: 2px;
  }
  .cd-since { border-top: 2px solid #9FE1CB; }
  .cd-until { border-top: 2px solid #FAC775; }
  .cd-since .cd-num { color: #1D9E75; }
  .cd-until .cd-num { color: #BA7517; }

  /* ── LOGIN OVERLAY ── */
  #login-overlay {
    position: fixed; inset: 0;
    background: var(--color-background-secondary);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  #login-overlay.hidden { display: none; }
  .login-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 2rem 2.5rem;
    width: 100%; max-width: 340px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    text-align: center;
  }
  .login-card h2 { font-size: 1rem; font-weight: 600; color: var(--color-text-primary); margin-bottom: 0.35rem; }
  .login-card p  { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
  .login-input {
    width: 100%; padding: 9px 12px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    font-size: 14px; font-family: inherit;
    outline: none; transition: border-color 0.15s;
    text-align: center; letter-spacing: 0.1em;
  }
  .login-input:focus { border-color: var(--color-text-secondary); }
  .login-input.error { border-color: #E05252; }
  .login-btn {
    margin-top: 12px; width: 100%; padding: 9px;
    border-radius: var(--border-radius-md); border: none;
    background: var(--color-text-primary); color: var(--color-background-primary);
    font-size: 13px; font-weight: 500; font-family: inherit;
    cursor: pointer; transition: opacity 0.15s;
  }
  .login-btn:hover { opacity: 0.85; }
  .login-error { font-size: 11px; color: #E05252; margin-top: 8px; min-height: 16px; }

  /* ── MOBILE ── */
  @media (max-width: 430px) {
    .sidebar {
      width: 100%;
      height: 56px;
      min-height: unset;
      flex-direction: row;
      top: auto; bottom: 0; left: 0; right: 0;
      border-right: none;
      border-top: 0.5px solid var(--color-border-tertiary);
      overflow: visible;
    }
    .sidebar.collapsed { width: 100%; }
    .sidebar-header { display: none; }
    .sidebar-nav {
      flex-direction: row;
      padding: 0;
      gap: 0;
      width: 100%;
      justify-content: space-around;
      align-items: center;
    }
    .nav-item {
      flex-direction: column;
      gap: 3px;
      padding: 8px 6px;
      align-items: center;
      justify-content: center;
      flex: 1;
      border-radius: 0;
    }
    .nav-label { font-size: 10px; opacity: 1 !important; }
    .main {
      margin-left: 0 !important;
      padding: 1rem 0.75rem;
      padding-bottom: 72px;
      max-width: 100%;
    }
    h1 { font-size: 0.95rem; margin-bottom: 1rem; }
    .tabs { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; gap: 6px; margin-bottom: 14px; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { white-space: nowrap; padding: 6px 12px; font-size: 12px; flex-shrink: 0; }
    .top-card { padding: 1rem; }
    .app-row { gap: 10px; padding: 10px 0; }
    .app-logo { width: 32px; height: 32px; font-size: 10px; }
    .app-name { font-size: 13px; }
    .app-desc, .app-why { font-size: 11px; }
    .stat-pill { font-size: 10px; padding: 2px 6px; }
    .metrics { grid-template-columns: 1fr 1fr; gap: 6px; }
    .mcard { padding: 8px 10px; }
    .mcard-val { font-size: 15px; }
    .tyear  { min-width: 28px; }
    .tusers { min-width: 48px; font-size: 10px; }
    .tmrr   { min-width: 54px; font-size: 10px; }
    .tarr   { min-width: 54px; font-size: 10px; }
    .thito  { display: none; }
    .trow, .trow.key { gap: 6px; }
    .chart-wrap { height: 160px; }
    .countdown-grid { grid-template-columns: 1fr; }
    .cd-num { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
  <div class="login-card">
    <h2>Acceso restringido</h2>
    <p>Introduce la contraseña para continuar</p>
    <input class="login-input" type="password" id="pwd" placeholder="••••••••"
           onkeydown="if(event.key==='Enter') checkPwd()">
    <button class="login-btn" onclick="checkPwd()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <img class="sidebar-logo" src="Images/apple-touch-icon.png" alt="Project NOS">
    <button class="btn-collapse" onclick="toggleSidebar()" title="Colapsar">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="3" y1="4" x2="13" y2="4"/>
        <line x1="3" y1="8" x2="13" y2="8"/>
        <line x1="3" y1="12" x2="13" y2="12"/>
      </svg>
    </button>
  </div>
  <div class="sidebar-nav">
    <button class="nav-item active" onclick="showSection('escenarios')" id="nav-escenarios">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="5" height="5" rx="1"/>
          <rect x="9" y="2" width="5" height="5" rx="1"/>
          <rect x="2" y="9" width="5" height="5" rx="1"/>
          <rect x="9" y="9" width="5" height="5" rx="1"/>
        </svg>
      </span>
      <span class="nav-label">Escenarios</span>
    </button>
    <button class="nav-item" onclick="showSection('cuentas')" id="nav-cuentas">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="6"/>
          <polyline points="8,4.5 8,8 10.5,9.5"/>
        </svg>
      </span>
      <span class="nav-label">Cuentas atrás</span>
    </button>
  </div>
</nav>

<!-- MAIN -->
<main class="main" id="main">

  <!-- ESCENARIOS -->
  <div class="section active" id="section-escenarios">
    <h1>4 escenarios con apps reales</h1>
    <div class="tabs">
      <button class="tab" onclick="set(0)" id="tab0">Idea mediocre</button>
      <button class="tab" onclick="set(1)" id="tab1">Buena idea</button>
      <button class="tab" onclick="set(2)" id="tab2">Gran idea global</button>
      <button class="tab" onclick="set(3)" id="tab3">Excepcional</button>
    </div>
    <div id="content"></div>
  </div>

  <!-- CUENTAS ATRÁS -->
  <div class="section" id="section-cuentas">
    <h1>Cuentas atrás</h1>
    <div class="countdown-grid">

      <div class="cd-card cd-since">
        <div class="cd-title">O</div>
        <div class="cd-date">27 de febrero de 2027</div>
        <div class="cd-units">
          <div class="cd-unit"><span class="cd-num" id="s-days">--</span><span class="cd-label">días</span></div>
          <div class="cd-unit"><span class="cd-num" id="s-hours">--</span><span class="cd-label">horas</span></div>
          <div class="cd-unit"><span class="cd-num" id="s-mins">--</span><span class="cd-label">min</span></div>
          <div class="cd-unit"><span class="cd-num" id="s-secs">--</span><span class="cd-label">seg</span></div>
        </div>
      </div>

      <div class="cd-card cd-until">
        <div class="cd-title">A</div>
        <div class="cd-date">18 de mayo de 2027</div>
        <div class="cd-units">
          <div class="cd-unit"><span class="cd-num" id="u-days">--</span><span class="cd-label">días</span></div>
          <div class="cd-unit"><span class="cd-num" id="u-hours">--</span><span class="cd-label">horas</span></div>
          <div class="cd-unit"><span class="cd-num" id="u-mins">--</span><span class="cd-label">min</span></div>
          <div class="cd-unit"><span class="cd-num" id="u-secs">--</span><span class="cd-label">seg</span></div>
        </div>
      </div>

    </div>
  </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ── SIDEBAR ──
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const main = document.getElementById('main');
  sb.classList.toggle('collapsed');
  main.classList.toggle('expanded');
}

// ── SECTIONS ──
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('section-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
}

// ── SCENARIOS ──
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
const tickColor = '#888780';

const scenarios = [
  {
    tabClass: 'active-gray', color: '#888780', colorLight: 'rgba(136,135,128,0.08)',
    tagBg: '#D3D1C7', tagColor: '#2C2C2A', borderColor: '#888780',
    label: 'Escenario 1 · Idea mediocre',
    apps: [
      { initials:'WL', bg:'#D3D1C7', textColor:'#2C2C2A', name:'Wunderlist',
        desc:'App de listas de tareas con buen diseño. Creada en 2011, creció bien pero nunca encontró un diferencial claro frente a Things, OmniFocus o Remember the Milk.',
        why:'Microsoft la compró en 2015 por ~$100M y la cerró en 2020. Sin diferencial real, acabó absorbida.',
        stats:['Vendida ~$100M','Cerrada en 2020','Sin modelo sostenible'] },
      { initials:'Any', bg:'#B4B2A9', textColor:'#2C2C2A', name:'Any.do',
        desc:'Otra app de tareas y listas con diseño minimalista. Lleva desde 2011 y sigue existiendo, pero nunca despegó como categoría propia.',
        why:'Sobrevive pero no domina. Con millones de descargas gratuitas y conversión a pago muy baja. El problema: no hay urgencia en cambiar de app de notas.',

let current = 1;
let chart = null;

function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return Math.round(n/1000)+'k';
  return n.toString();
}
function fmtEur(n) {
  if (n >= 1000000) return '€'+(n/1000000).toFixed(1)+'M';
  if (n >= 1000) return '€'+Math.round(n/1000)+'k';
  return '€'+n;
}

function set(idx) {
  current = idx;
  const s = scenarios[idx];
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.className = 'tab' + (i === idx ? ' ' + s.tabClass : '');
  });
  render();
}

function render() {
  const s = scenarios[current];
  const u10 = s.users[10], mrr10 = Math.round(u10*9.99), arr10 = mrr10*12;
  const u5  = s.users[5],  mrr5  = Math.round(u5*9.99);
  const labels = ['Año 0','Año 1','Año 2','Año 3','Año 4','Año 5','Año 6','Año 7','Año 8','Año 9','Año 10'];

  const appsHtml = s.apps.map(a => `
    <div class="app-row">
      <div class="app-logo" style="background:${a.bg};color:${a.textColor}">${a.initials}</div>
      <div style="flex:1;min-width:0">
        <p class="app-name">${a.name}</p>
        <p class="app-desc">${a.desc}</p>
        <p class="app-why" style="color:${s.color}">${a.why}</p>
        <div class="app-stats">${a.stats.map(st=>`<span class="stat-pill">${st}</span>`).join('')}</div>
      </div>
    </div>`).join('');

  let timelineHtml = `
    <div class="thead">
      <span class="th" style="min-width:40px">Año</span>
      <span class="th" style="min-width:80px">Usuarios</span>
      <span class="th" style="min-width:80px">MRR</span>
      <span class="th" style="min-width:80px">ARR</span>
      <span class="th" style="margin-left:auto">Hito</span>
    </div>`;
  for (let i = 1; i <= 10; i++) {
    const u = s.users[i], mrr = Math.round(u*9.99), arr = mrr*12;
    const isKey = [2,5,10].includes(i);
    timelineHtml += `
      <div class="trow${isKey?' key':''}">
        <span class="tyear">Año ${i}</span>
        <span class="tusers">${fmt(u)}</span>
        <span class="tmrr">${fmtEur(mrr)}/mes</span>
        <span class="tarr">${fmtEur(arr)}/año</span>
        <span class="thito">${s.milestones[i]}</span>
      </div>`;
  }

  document.getElementById('content').innerHTML = `
    <div class="top-card">
      <span class="scenario-label" style="background:${s.tagBg};color:${s.tagColor}">${s.label}</span>
      ${appsHtml}
      <div class="lesson-box" style="border-left-color:${s.borderColor}">
        <div class="lesson-label" style="color:${s.borderColor}">Patrón común</div>
        <div class="lesson-text">${s.lesson}</div>
      </div>
    </div>
    <div class="metrics">
      <div class="mcard"><div class="mcard-label">Usuarios año 10</div><div class="mcard-val">${fmt(u10)}</div><div class="mcard-sub">pagando €9,99/mes</div></div>
      <div class="mcard"><div class="mcard-label">MRR año 10</div><div class="mcard-val">${fmtEur(mrr10)}</div><div class="mcard-sub">al mes</div></div>
      <div class="mcard"><div class="mcard-label">ARR año 10</div><div class="mcard-val">${fmtEur(arr10)}</div><div class="mcard-sub">al año</div></div>
      <div class="mcard"><div class="mcard-label">MRR año 5</div><div class="mcard-val">${fmtEur(mrr5)}</div><div class="mcard-sub">punto intermedio</div></div>
    </div>
    <div class="chart-wrap">
      <canvas id="mainChart" role="img" aria-label="Proyección usuarios 10 años · ${s.label}"></canvas>
    </div>
    <div class="timeline">${timelineHtml}</div>`;

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('mainChart'), {
    type: 'line',
    data: { labels, datasets: [{
      label: 'Usuarios', data: s.users,
      borderColor: s.color, backgroundColor: s.colorLight,
      borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: s.color,
      tension: 0.4, fill: true
    }]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${fmt(ctx.parsed.y)} usuarios · MRR ${fmtEur(Math.round(ctx.parsed.y*9.99))}` }}
      },
      scales: {
        x: { grid:{color:gridColor}, ticks:{color:tickColor,font:{size:11}} },
        y: { grid:{color:gridColor}, ticks:{color:tickColor,font:{size:11},callback:v=>fmt(v)} }
      }
    }
  });
}

function pad(n) { return String(Math.floor(n)).padStart(2,'0'); }

function updateCountdowns() {
  const now   = new Date();
  const since = new Date('2027-02-27T00:00:00');
  const until = new Date('2027-05-18T00:00:00');

  // Since
  let diffS = Math.max(0, since - now) / 1000;
  const sDays  = Math.floor(diffS / 86400); diffS -= sDays * 86400;
  const sHours = Math.floor(diffS / 3600);  diffS -= sHours * 3600;
  const sMins  = Math.floor(diffS / 60);    diffS -= sMins * 60;
  const sSecs  = Math.floor(diffS);
  document.getElementById('s-days').textContent  = sDays;
  document.getElementById('s-hours').textContent = pad(sHours);
  document.getElementById('s-mins').textContent  = pad(sMins);
  document.getElementById('s-secs').textContent  = pad(sSecs);

  // Until
  let diffU = Math.max(0, until - now) / 1000;
  const uDays  = Math.floor(diffU / 86400); diffU -= uDays * 86400;
  const uHours = Math.floor(diffU / 3600);  diffU -= uHours * 3600;
  const uMins  = Math.floor(diffU / 60);    diffU -= uMins * 60;
  const uSecs  = Math.floor(diffU);
  document.getElementById('u-days').textContent  = uDays;
  document.getElementById('u-hours').textContent = pad(uHours);
  document.getElementById('u-mins').textContent  = pad(uMins);
  document.getElementById('u-secs').textContent  = pad(uSecs);
}

updateCountdowns();
setInterval(updateCountdowns, 1000);

const PASSWORD = 'success';
function checkPwd() {
  const val = document.getElementById('pwd').value;
  const input = document.getElementById('pwd');
  if (val === PASSWORD) {
    document.getElementById('login-overlay').classList.add('hidden');
    sessionStorage.setItem('auth', '1');
  } else {
    input.classList.add('error');
    document.getElementById('login-error').textContent = 'Contraseña incorrecta';
    setTimeout(() => { input.classList.remove('error'); input.value = ''; input.focus(); }, 1200);
  }
}
if (sessionStorage.getItem('auth') === '1') {
  document.getElementById('login-overlay').classList.add('hidden');
}
